services:
  postgres:
    image: postgres:16-alpine
    container_name: seo-postgres
    environment:
      POSTGRES_DB: seo_dashboard
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
